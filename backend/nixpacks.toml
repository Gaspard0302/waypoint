[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "at-spi2-atk", "libxkbcommon", "libXcomposite", "libXdamage", "libXfixes", "libXrandr", "mesa", "pango", "cairo", "alsa-lib", "xorg.libxcb", "glib", "gtk3", "dbus"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
